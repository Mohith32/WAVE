spring.application.name=wave

# ==== DATABASE ====================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/wave}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.open-in-view=false

# ==== HIKARI CONNECTION POOL ======================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=WaveHikariPool

# ==== FLYWAY ======================================================
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ==== REDIS =======================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
# Longer timeouts for TLS + cross-region latency (Upstash)
spring.data.redis.timeout=${REDIS_TIMEOUT:10000ms}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:10000ms}
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=2000ms
spring.data.redis.lettuce.shutdown-timeout=200ms
# Redis health check can be slow on free tiers — give it headroom
management.health.redis.enabled=false

# ==== CACHE =======================================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# ==== JWT =========================================================
jwt.secret=${JWT_SECRET:DevSecretChangeMeInProd_MustBeAtLeast64CharsForHS512_NeverUseThisInProduction!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==== MULTIPART & FILE STORAGE ====================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Storage backend: "supabase" (recommended) or "local"
wave.storage.backend=${STORAGE_BACKEND:local}
wave.storage.local.dir=${LOCAL_UPLOAD_DIR:./uploads}

# Supabase Storage
wave.storage.supabase.url=${SUPABASE_URL:}
wave.storage.supabase.service-key=${SUPABASE_SERVICE_KEY:}
wave.storage.supabase.bucket=${SUPABASE_BUCKET:wave-uploads}
wave.storage.supabase.public=${SUPABASE_PUBLIC_BUCKET:true}

# ==== SERVER ======================================================
server.port=${PORT:8080}
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:200}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN:20}
server.tomcat.accept-count=200
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=8192
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,application/javascript,text/css
server.compression.min-response-size=1024
server.http2.enabled=true

# ==== GRACEFUL SHUTDOWN ===========================================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ==== ACTUATOR (health checks for Render/Fly/K8s) =================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# ==== CORS ========================================================
wave.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ==== RATE LIMITING ===============================================
wave.ratelimit.auth.capacity=${RL_AUTH_CAPACITY:10}
wave.ratelimit.auth.refill-seconds=${RL_AUTH_REFILL:60}
wave.ratelimit.upload.capacity=${RL_UPLOAD_CAPACITY:30}
wave.ratelimit.upload.refill-seconds=${RL_UPLOAD_REFILL:60}

# ==== WEBSOCKET ===================================================
wave.websocket.redis-channel=wave:ws:messages

# ==== MAIL (Brevo SMTP) ===========================================
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# From address must be a VERIFIED sender in Brevo
wave.mail.from=${MAIL_FROM:noreply@example.com}
wave.mail.from-name=${MAIL_FROM_NAME:Wave}

# OTP config
wave.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:10}
wave.otp.verified-window-minutes=${OTP_VERIFIED_WINDOW_MINUTES:30}
wave.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
# Toggle email verification requirement on register
wave.otp.require-verification=${OTP_REQUIRE_VERIFICATION:true}

# ==== LOGGING =====================================================
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.wave=${APP_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=WARN
